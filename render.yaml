services:
  - type: web
    name: sigsobse-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: GIS_DEBUG
        value: "false"
      - key: SERVE_FRONTEND
        value: "false"
      - key: PGHOST
        sync: false
      - key: PGPORT
        value: "5432"
      - key: PGDATABASE
        value: sig_sobse
      - key: PGSCHEMA
        value: sig_sobse
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
      - key: CACHE_INVALIDATE_TOKEN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
